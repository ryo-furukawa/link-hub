services:
  backend:
    build: ./docker/backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/data/app.db
      - PORT=8080
      - MIGRATIONS_PATH=/app/migrations

  frontend:
    build: ./docker/frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend
