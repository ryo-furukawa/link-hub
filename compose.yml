services:
  backend:
    build: ./docker/backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/data/app.db
      - PORT=8080

  frontend:
    build: ./docker/frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
