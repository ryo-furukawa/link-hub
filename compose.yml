services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkhub
      POSTGRES_PASSWORD: linkhub
      POSTGRES_DB: linkhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./docker/backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://linkhub:linkhub@postgres:5432/linkhub?sslmode=disable
      - PORT=8080
      - MIGRATIONS_PATH=/app/migrations
    depends_on:
      - postgres

  frontend:
    build: ./docker/frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
